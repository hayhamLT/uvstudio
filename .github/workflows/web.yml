# Build the static web bundle and (a) upload it as an artifact for embedding in
# preshow.link, (b) deploy a live demo to GitHub Pages.
#
# The `build` job always produces the embeddable `dist/` artifact (what you pull
# into preshow.link). The `deploy` job publishes a live demo to GitHub Pages and
# is OPT-IN — it only runs when the repo variable DEPLOY_PAGES == 'true'.
# To enable it: make the repo public OR use a plan with private Pages, then
#   repo Settings → Pages → Source: "GitHub Actions"
#   gh variable set DEPLOY_PAGES --body true
name: Web build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # embeddable bundle (base "/" — drop into preshow.link as-is)
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: uvstudio-web
          path: dist
      # standalone demo for GitHub Pages (served under /uvstudio/) — opt-in
      - if: ${{ vars.DEPLOY_PAGES == 'true' }}
        run: npx vite build --base=/uvstudio/ --outDir dist-pages
      - if: ${{ vars.DEPLOY_PAGES == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    if: ${{ vars.DEPLOY_PAGES == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
