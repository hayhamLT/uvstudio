# Build the static web bundle and (a) upload it as an artifact for embedding in
# preshow.link, (b) deploy the live site to GitHub Pages at uv.preshow.link.
#
# The `build` job always produces the embeddable `dist/` artifact (what you pull
# into preshow.link). The `deploy` job publishes to GitHub Pages and is OPT-IN —
# it only runs when the repo variable DEPLOY_PAGES == 'true'.
# To enable it (needs a public repo OR a plan with private Pages, e.g. Pro):
#   repo Settings → Pages → Source: "GitHub Actions"
#   gh variable set DEPLOY_PAGES --body true
# The custom domain uv.preshow.link is baked in via the CNAME file below, so the
# site is served at root (base "/") — no subpath rebuild needed.
name: Web build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # embeddable bundle (base "/" — drop into preshow.link as-is)
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: uvstudio-web
          path: dist
      # GitHub Pages at uv.preshow.link (custom domain → served at root) — opt-in
      - if: ${{ vars.DEPLOY_PAGES == 'true' }}
        run: echo 'uv.preshow.link' > dist/CNAME
      - if: ${{ vars.DEPLOY_PAGES == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: ${{ vars.DEPLOY_PAGES == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
