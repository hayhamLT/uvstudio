# Build the UV Studio desktop app for macOS + Windows and attach the installers
# to a draft GitHub Release. Triggers on a version tag (e.g. `git tag v0.1.0 &&
# git push --tags`) or manually from the Actions tab.
#
# Prereqs in the repo:
#   • a committed package-lock.json (for `npm ci`)
#   • generated icons in src-tauri/icons/ (run `npm run tauri icon your.png` once)
#   • optional code-signing secrets (see commented env below) for notarised builds
name: Desktop build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # tauri-action creates the GitHub Release + uploads installers

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal (Apple Silicon + Intel)
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    # true only when the macOS signing certificate secret actually exists — used
    # to gate the signed build so empty secrets don't make codesign fail.
    env:
      MAC_SIGN: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      # Signed macOS build — ONLY when the Apple cert secret is set. Passing empty
      # APPLE_* vars makes tauri-action attempt (and fail) codesign, so we gate it.
      # See docs/SIGNING.md for the certificate + secrets.
      - name: Build + release (macOS, signed)
        if: matrix.platform == 'macos-latest' && env.MAC_SIGN == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'UV Studio ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Plain build — Windows always, and macOS when no signing cert is configured
      # (builds succeed unsigned). No Apple env, so codesign is never attempted.
      - name: Build + release
        if: matrix.platform == 'windows-latest' || env.MAC_SIGN != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'UV Studio ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
