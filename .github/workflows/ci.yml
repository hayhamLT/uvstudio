# Fast smoke test on every push / PR: type-check + unit tests + a web build.
# Keeps both the web and (frontend of the) desktop target honest before the
# heavier desktop.yml installer build runs on a tag.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Web build
        run: npm run build

  # Run the Rust plugin-install path tests on REAL Windows: %APPDATA%\Maxon,
  # %APPDATA%\Blender Foundation and the plugins-folder resolution are exercised
  # with actual Windows path semantics (backslashes, no canonicalize \\?\ etc).
  rust-paths-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      # tauri::generate_context! embeds ../dist at compile time — build it first
      - run: npm ci
      - run: npm run build
      - name: Cargo tests (plugin path discovery)
        run: cargo test --manifest-path src-tauri/Cargo.toml
